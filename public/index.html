<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Add — Read-it-later</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Read-it-later</span>
    </a>
    <nav>
      <a href="/" class="active">Add</a>
      <a href="/library">Library</a>
      <form action="/search" method="get" class="search">
        <input type="search" name="q" placeholder="Search title or summary…" autocomplete="off">
      </form>
    </nav>
    <div class="user" id="user-chip">…</div>
  </header>

  <main>
    <section class="page">
      <header class="page-header">
        <h1>Save something to read later</h1>
        <p class="page-sub">Paste a link or drop a PDF. We'll extract, summarize, and read it aloud.</p>
      </header>

      <div class="add-grid">
        <section class="card add-card">
          <h2>From a URL</h2>
          <p class="hint">Best for blog posts and articles.</p>
          <form id="url-form" onsubmit="return false">
            <input type="url" id="url" placeholder="https://example.com/article" required autocomplete="off">
            <button id="save-url">Save URL</button>
          </form>
        </section>

        <section class="card add-card">
          <h2>From a PDF</h2>
          <p class="hint">Drop multiple files — they'll process in parallel.</p>
          <div class="drop" id="drop">
            <p>Drop PDFs here</p>
            <p class="hint-sm">or <label class="link" style="cursor:pointer">choose files<input type="file" id="files" accept="application/pdf" multiple hidden></label></p>
          </div>
        </section>
      </div>

      <section class="card log-card" hidden id="log-card">
        <h2>Activity</h2>
        <div id="log" aria-live="polite"></div>
      </section>
    </section>
  </main>

<script>
const log = document.getElementById('log');
const logCard = document.getElementById('log-card');
const write = (m) => {
  logCard.hidden = false;
  const line = document.createElement('div');
  line.className = 'log-line';
  line.textContent = m;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
};

// Show the username chip, mostly so users know who they're authenticated as.
fetch('/library', { headers: { accept: 'text/html' } })
  .then(r => r.text())
  .then(html => {
    const m = html.match(/class="user"[^>]*>([^<]+)</);
    if (m) document.getElementById('user-chip').textContent = m[1];
  })
  .catch(() => { document.getElementById('user-chip').textContent = '—'; });

document.getElementById('save-url').addEventListener('click', async () => {
  const input = document.getElementById('url');
  const url = input.value.trim();
  if (!url) return;
  write('→ Queueing ' + url);
  try {
    const r = await fetch('/save', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const data = await r.json();
    if (r.ok) {
      const tag = data.status === 'duplicate' ? '↺ already saved' : '✓ queued';
      write(`  ${tag} (${data.id.slice(0, 8)}…)`);
      if (data.status !== 'duplicate') input.value = '';
    } else {
      write(`  ✗ ${data.error || r.status}`);
    }
  } catch (err) {
    write(`  ✗ ${err.message}`);
  }
});

const drop = document.getElementById('drop');
const fileInput = document.getElementById('files');

['dragenter', 'dragover'].forEach(e =>
  drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add('over'); })
);
['dragleave', 'drop'].forEach(e =>
  drop.addEventListener(e, () => drop.classList.remove('over'))
);
drop.addEventListener('drop', ev => { ev.preventDefault(); upload(ev.dataTransfer.files); });
fileInput.addEventListener('change', () => upload(fileInput.files));

async function upload(fileList) {
  for (const file of fileList) {
    if (file.type !== 'application/pdf') {
      write(`  ✗ ${file.name} — not a PDF`);
      continue;
    }
    write('→ Uploading ' + file.name);
    try {
      const fd = new FormData();
      fd.append('pdf', file);
      const r = await fetch('/save-pdf', { method: 'POST', body: fd });
      const data = await r.json();
      if (r.ok) {
        const tag = data.status === 'duplicate' ? '↺ already saved' : '✓ queued';
        write(`  ${tag} (${data.id.slice(0, 8)}…)`);
      } else {
        write(`  ✗ ${data.error || r.status}`);
      }
    } catch (err) {
      write(`  ✗ ${err.message}`);
    }
  }
}
</script>
</body>
</html>
