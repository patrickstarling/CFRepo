<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Read-it-later</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 16px/1.5 system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
  h1 { margin: 0 0 .25rem; }
  p.lede { color: #666; margin: 0 0 1.5rem; }
  .row { display: grid; gap: 1rem; grid-template-columns: 1fr; }
  @media (min-width: 540px) { .row { grid-template-columns: 1fr 1fr; } }
  .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; }
  .card h2 { margin: 0 0 .5rem; font-size: 1rem; }
  input[type=url], button { font: inherit; padding: .5rem .75rem; border-radius: 6px; border: 1px solid #ccc; }
  input[type=url] { width: 100%; box-sizing: border-box; margin-bottom: .5rem; }
  button { cursor: pointer; background: #2563eb; color: #fff; border-color: #2563eb; }
  button:disabled { opacity: .5; cursor: wait; }
  .drop { border: 2px dashed #bbb; border-radius: 8px; padding: 1.25rem; text-align: center; color: #666; }
  .drop.over { border-color: #2563eb; color: #2563eb; }
  #log { font: 13px ui-monospace, monospace; background: #f5f5f5; padding: .75rem; border-radius: 6px; min-height: 4rem; white-space: pre-wrap; margin-top: 1rem; }
  a { color: #2563eb; }
</style>
</head>
<body>
<h1>Read-it-later</h1>
<p class="lede">Save articles. Get them read to you. <a href="/playlist">Playlist →</a></p>

<div class="row">
  <div class="card">
    <h2>Save a URL</h2>
    <input type="url" id="url" placeholder="https://example.com/article" required>
    <button id="save-url">Save URL</button>
  </div>

  <div class="card">
    <h2>Upload PDFs</h2>
    <div class="drop" id="drop">
      Drop PDFs here or
      <label style="text-decoration:underline;cursor:pointer">
        choose files<input type="file" id="files" accept="application/pdf" multiple hidden>
      </label>
    </div>
  </div>
</div>

<div id="log" aria-live="polite"></div>

<script>
const log = document.getElementById('log');
const write = (m) => { log.textContent = (log.textContent ? log.textContent + '\n' : '') + m; };

document.getElementById('save-url').addEventListener('click', async () => {
  const input = document.getElementById('url');
  const url = input.value.trim();
  if (!url) return;
  write('• Queueing ' + url);
  const r = await fetch('/save', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ url }) });
  const data = await r.json();
  write(r.ok ? `  ✓ ${data.id}` : `  ✗ ${data.error || r.status}`);
  if (r.ok) input.value = '';
});

const drop = document.getElementById('drop');
const fileInput = document.getElementById('files');

['dragenter','dragover'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(e => drop.addEventListener(e, () => drop.classList.remove('over')));
drop.addEventListener('drop', ev => { ev.preventDefault(); upload(ev.dataTransfer.files); });
fileInput.addEventListener('change', () => upload(fileInput.files));

async function upload(fileList) {
  for (const file of fileList) {
    if (file.type !== 'application/pdf') { write(`  ✗ ${file.name} — not a PDF`); continue; }
    write('• Uploading ' + file.name);
    const fd = new FormData();
    fd.append('pdf', file);
    const r = await fetch('/save-pdf', { method: 'POST', body: fd });
    const data = await r.json();
    write(r.ok ? `  ✓ ${data.id}` : `  ✗ ${data.error || r.status}`);
  }
}
</script>
</body>
</html>
